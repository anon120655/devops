# 🔍 Reusable Spring Boot CI
# ใช้กับ: Java Spring Boot Applications
# 📚 Docs: https://github.com/anon120655/devops

name: Reusable Spring Boot CI

on:
  workflow_call:
    inputs:
      java-version:
        description: 'Java version'
        type: string
        default: '17'
      java-distribution:
        description: 'Java distribution (temurin, corretto, zulu, etc.)'
        type: string
        default: 'temurin'

      maven-profile:
        description: 'Maven profile (e.g., prod, uat, dev)'
        type: string
        default: 'prod'
      runs-on:
        description: 'Runner to use'
        type: string
        default: 'self-hosted'

jobs:
  quality:
    name: Quality Gate
    runs-on: ${{ inputs.runs-on }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: ${{ inputs.java-distribution }}
          cache: 'maven'

      # ─────────────────────────────────────────────────────────────
      # Build (Maven)
      # ─────────────────────────────────────────────────────────────
      - name: Build with Maven
        run: |
          echo "🏗️ Building with Maven (Profile: ${{ inputs.maven-profile }})..."
          chmod +x mvnw 2>/dev/null || true
          ./mvnw clean package -DskipTests -P${{ inputs.maven-profile }} --batch-mode
          echo "✅ Maven build passed"

      # ─────────────────────────────────────────────────────────────
      # 📊 Summary
      # ─────────────────────────────────────────────────────────────
      - name: Summary
        if: always()
        run: |
          echo "## 🔍 Spring Boot CI Quality Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🏗️ Build (Maven) | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Info | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Java** | ${{ inputs.java-version }} (${{ inputs.java-distribution }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Build Tool** | Maven |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
