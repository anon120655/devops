# 🔍 Reusable Spring Boot CI
# ใช้กับ: Java Spring Boot Applications
# 📚 Docs: https://github.com/anon120655/devops

name: Reusable Spring Boot CI

on:
  workflow_call:
    inputs:
      java-version:
        description: 'Java version'
        type: string
        default: '17'
      java-distribution:
        description: 'Java distribution (temurin, corretto, zulu, etc.)'
        type: string
        default: 'temurin'
      build-tool:
        description: 'Build tool: maven or gradle'
        type: string
        default: 'maven'
      runs-on:
        description: 'Runner to use'
        type: string
        default: 'self-hosted'

jobs:
  quality:
    name: Quality Gate
    runs-on: ${{ inputs.runs-on }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: ${{ inputs.java-distribution }}
          cache: ${{ inputs.build-tool }}

      # ─────────────────────────────────────────────────────────────
      # Build (Maven)
      # ─────────────────────────────────────────────────────────────
      - name: Build with Maven
        if: inputs.build-tool == 'maven'
        run: |
          echo "🏗️ Building with Maven..."
          chmod +x mvnw 2>/dev/null || true
          ./mvnw clean package -DskipTests --batch-mode
          echo "✅ Maven build passed"

      # ─────────────────────────────────────────────────────────────
      # Build (Gradle)
      # ─────────────────────────────────────────────────────────────
      - name: Build with Gradle
        if: inputs.build-tool == 'gradle'
        run: |
          echo "🏗️ Building with Gradle..."
          chmod +x gradlew 2>/dev/null || true
          ./gradlew clean build -x test || gradle clean build -x test
          echo "✅ Gradle build passed"



      # ─────────────────────────────────────────────────────────────
      # 📊 Summary
      # ─────────────────────────────────────────────────────────────
      - name: Summary
        if: always()
        run: |
          echo "## 🔍 Spring Boot CI Quality Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🏗️ Build (${{ inputs.build-tool }}) | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Info | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Java** | ${{ inputs.java-version }} (${{ inputs.java-distribution }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Build Tool** | ${{ inputs.build-tool }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
