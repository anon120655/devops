# 🚀 Reusable Angular Deploy (SSH + Static Files)
# ใช้กับ: Angular Applications
# 📚 Docs: https://github.com/anon120655/devops

# name: ชื่อของ workflow ที่จะแสดงในหน้า Actions ของ GitHub
name: Reusable Angular Deploy

# on: กำหนดเหตุการณ์ (Trigger) ที่จะทำให้ workflow นี้เริ่มทำงาน
# (workflow_call คือกำหนดให้เป็น Reusable Workflow หรือให้ workflow อื่นเรียกใช้ได้)
on:
  workflow_call:
    # inputs: คือตัวแปร (Parameters) ที่ฝั่งเรียกใช้ต้องส่งต่อเข้ามาให้ workflow นี้
    inputs:
      deploy-path:
        description: 'Deploy path on server (e.g., /home/locus/public_html_uat)'
        type: string
        required: true
      node-version:
        description: 'Node.js version'
        type: string
        default: '16'
      angular-build-configuration:
        description: 'Angular build configuration (e.g., production, uat)'
        type: string
        default: 'production'
      prebuild-script:
        description: 'Script to run before build (e.g., npm run prebuild.uat)'
        type: string
        default: ''
      dist-subfolder:
        description: 'Subfolder name inside dist/ (ปกติจะเป็นชื่อ project ใน angular.json)'
        type: string
        default: ''
      runs-on:
        description: 'Runner to use'
        type: string
        default: 'self-hosted'
    # secrets: ข้อมูลความลับ (เช่น รหัสผ่าน, SSH Keys) ที่ใช้เชื่อมต่อ Server ป้องกันการหลุดรั่วไหล
    secrets:
      SSH_PRIVATE_KEY:
        required: true
      SSH_HOST:
        required: true
      SSH_USERNAME:
        required: true
      SSH_PORT:
        required: false
      SU_PASSWORD:
        required: true

# concurrency: จัดการการทำงานซ้ำซ้อน หากมีการ deploy ซ้ำกัน จะให้รอ, ทำต่อ หรือยกเลิกอันเก่า
concurrency:
  group: deploy-angular-${{ github.ref }}
  cancel-in-progress: false

# jobs: กำหนดกลุ่มของงาน (Jobs) หลักที่จะให้ workflow นี้ทำ
jobs:
  # deploy: ตั้งชื่องานเองได้
  deploy:
    name: Deploy Angular → Server
    # runs-on: เลือกว่าจะไปรันบน Server หรือระบบไหน (Ubuntu, Windows หรือ self-hosted ของบริษัท)
    runs-on: ${{ inputs.runs-on }}

    # steps: รายการคำสั่งย่อย (Steps) ที่รันเรียงตามลำดับจากบนลงล่าง
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm' # cache npm packages เพื่อเพิ่มความเร็ว (ข้ามดาวน์โหลดซ้ำถ้า package-lock.json ไม่เปลี่ยน)

      - name: Get dependencies
        shell: bash
        run: |
          set -e
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f yarn.lock ]; then
            corepack enable
            yarn install --frozen-lockfile
          else
            echo "::error::ไม่พบ package-lock.json หรือ yarn.lock — ต้องมี lockfile อย่างใดอย่างหนึ่ง"
            exit 1
          fi

      # ─────────────────────────────────────────────────────────────
      # 1. Prebuild (optional) - เช่น ปรับวันที่
      # ─────────────────────────────────────────────────────────────
      - name: Run prebuild script
        if: inputs.prebuild-script != ''
        env:
          TZ: Asia/Bangkok # ⏰ กำหนด Time Zone พื้นฐานของ Step นี้เป็นประเทศไทย (UTC+7) แก้ปัญหาเวลาห่าง 7 ชั่วโมง
        run: |
          echo "🔧 Running prebuild: ${{ inputs.prebuild-script }}"
          ${{ inputs.prebuild-script }}
          echo "✅ Prebuild done"

      # ─────────────────────────────────────────────────────────────
      # 2. Build Angular
      # ─────────────────────────────────────────────────────────────
      - name: Build Angular
        env:
          NODE_OPTIONS: --max-old-space-size=6144
        run: |
          echo "🏗️ Building Angular (${{ inputs.angular-build-configuration }})..."
          npx ng build --configuration=${{ inputs.angular-build-configuration }}
          echo "✅ Build completed"

      # ─────────────────────────────────────────────────────────────
      # 3. Setup SSH Key
      # ─────────────────────────────────────────────────────────────
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SSH_PORT || 22 }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      # ─────────────────────────────────────────────────────────────
      # 4. Backup current deployment (ไฟล์ root + assets → ib_backup/YYYYMMDD)
      # ─────────────────────────────────────────────────────────────
      - name: Backup current deployment
        env:
          DEPLOY_PATH: ${{ inputs.deploy-path }}
        run: |
          echo "💾 Backing up current deployment..."
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -p ${{ secrets.SSH_PORT || 22 }} \
              -l "${{ secrets.SSH_USERNAME }}" ${{ secrets.SSH_HOST }} "
            set -e
            BACKUP_DIR=\"${DEPLOY_PATH}/ib_backup/\$(date +%Y%m%d)\"
            mkdir -p \"\$BACKUP_DIR\"
            echo \"📂 Backup target: \$BACKUP_DIR\"

            # copy ไฟล์เดี่ยวๆ ใน root (ไม่รวม folder)
            find \"${DEPLOY_PATH}\" -maxdepth 1 -type f -exec cp {} \"\$BACKUP_DIR/\" \;

            # copy folder assets
            [ -d \"${DEPLOY_PATH}/assets\" ] && cp -r \"${DEPLOY_PATH}/assets\" \"\$BACKUP_DIR/\"

            echo \"✅ Backup completed → \$BACKUP_DIR\"
          "

      # ─────────────────────────────────────────────────────────────
      # 5. Deploy static files to server
      # ─────────────────────────────────────────────────────────────
      - name: Deploy to server
        env:
          DEPLOY_PATH: ${{ inputs.deploy-path }}
          DIST_SUB: ${{ inputs.dist-subfolder }}
          SU_PASSWORD: ${{ secrets.SU_PASSWORD }}
          SSH_USER: ${{ secrets.SSH_USERNAME }}
        run: |
          echo "📦 Deploying Angular build to server..."

          if [ -n "$DIST_SUB" ]; then
            SOURCE="dist/${DIST_SUB}/"
          else
            SOURCE="dist/"
          fi

          echo "📂 Source: $SOURCE → $DEPLOY_PATH"

          # rsync ไป /tmp/angular-deploy ก่อน (หลีกเลี่ยง Permission denied กรณี folder owner เป็น root)
          rsync -az \
            -e "ssh -i ~/.ssh/deploy_key -l '${{ secrets.SSH_USERNAME }}' -o StrictHostKeyChecking=no -p ${{ secrets.SSH_PORT || 22 }}" \
            "$SOURCE" ${{ secrets.SSH_HOST }}:/tmp/angular-deploy/

          # ใช้ su - deploy จาก /tmp ไป deploy path ด้วยสิทธิ์ root แล้ว chown กลับเป็น user เดิม
          # -tt บังคับจัดสรร PTY ให้ su อ่าน password ได้ (password ส่งเป็นบรรทัดถัดไปผ่าน terminal)
          ssh -tt -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -p ${{ secrets.SSH_PORT || 22 }} \
            -l "${{ secrets.SSH_USERNAME }}" ${{ secrets.SSH_HOST }} << DEPLOY_SCRIPT
          su - -c "rsync -a --delete --exclude=ib_backup/ --exclude=dr/ --exclude=larngear_backup/ --exclude=pre-deploy/ --exclude=selfservice/ --exclude=00_backup_อย่าลบ/ /tmp/angular-deploy/ ${DEPLOY_PATH}/; chown -R ${SSH_USER}:${SSH_USER} ${DEPLOY_PATH}; rm -rf /tmp/angular-deploy; echo DEPLOY_OK"
          ${SU_PASSWORD}
          DEPLOY_SCRIPT

          echo "✅ Deploy completed"

      # ─────────────────────────────────────────────────────────────
      # 5. Cleanup SSH Key
      # ─────────────────────────────────────────────────────────────
      - name: Cleanup SSH Key
        if: always()
        run: rm -f ~/.ssh/deploy_key

      # ─────────────────────────────────────────────────────────────
      # 📊 Summary
      # ─────────────────────────────────────────────────────────────
      - name: Summary
        if: always()
        run: |
          echo "## 🚀 Angular Deployment Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | ${{ job.status == 'success' && '✅ Success' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Configuration** | ${{ inputs.angular-build-configuration }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Deploy Path** | ${{ inputs.deploy-path }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Tag** | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
