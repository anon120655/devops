# 🚀 Reusable .NET Deploy (dotnet publish + SSH rsync + systemd)
# ใช้กับ: ASP.NET Core บน Linux (Kestrel / systemd)
# 📚 Docs: https://github.com/anon120655/devops
# Backup step: pipe script to `ssh … bash -s` (avoids brittle multiline `"` / `\` continuations on GHA).

name: Reusable .NET Deploy

on:
  workflow_call:
    inputs:
      dotnet-version:
        description: ".NET SDK version (e.g. 6.0.x, 8.0.x)"
        type: string
        required: true
      csproj-path:
        description: "Path to .csproj from repo root"
        type: string
        required: true
      target-framework:
        description: "Target framework (e.g. net6.0)"
        type: string
        required: true
      runtime-identifier:
        description: "Runtime identifier for publish (linux-x64, win-x64). Empty = omit -r"
        type: string
        default: "linux-x64"
      self-contained:
        description: "Self-contained publish"
        type: boolean
        default: false
      project-kind:
        description: "backend | frontend — frontend strips appkeys/files from publish artifact; backup excludes wwwroot/files, image, appkeys"
        type: string
        default: "backend"
      deploy-path:
        description: "Remote directory for published files (e.g. /home/ibusiness/publish)"
        type: string
        required: true
      systemd-service:
        description: "systemd unit to restart after deploy (e.g. kestrel-helloapp_api.service)"
        type: string
        required: true
      working-directory:
        description: "Working directory relative to repo root"
        type: string
        default: "."
      backup-remote:
        description: "Backup remote deploy-path before rsync"
        type: boolean
        default: true
      backup-base-path:
        description: "Remote base dir for backups: <base>/<backend|frontend>/<YYYYMMDD>/ (date from server TZ)"
        type: string
        default: "/home/ibusiness/prd/ib_backup"
      rsync-delete:
        description: "rsync --delete (mirror remote to publish output; use with care)"
        type: boolean
        default: false
      pre-rsync-chown:
        description: "frontend: sudo chown -R deploy user on deploy-path before rsync (fixes wwwroot mkstemp Permission denied if dirs are root-owned). Requires NOPASSWD chown or same as systemctl sudo."
        type: boolean
        default: true
      runs-on:
        description: "Runner to use (Linux/macOS recommended for ssh/rsync)"
        type: string
        default: "self-hosted"
    secrets:
      SSH_PRIVATE_KEY:
        required: true
      SSH_HOST:
        required: true
      SSH_USERNAME:
        required: true
      SSH_PORT:
        required: false

concurrency:
  group: deploy-dotnet-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy .NET → Server
    runs-on: ${{ inputs.runs-on }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet-version }}

      - name: Publish
        env:
          CSPROJ: ${{ inputs.csproj-path }}
          FRAMEWORK: ${{ inputs.target-framework }}
          RID: ${{ inputs.runtime-identifier }}
          SELF_CONTAINED: ${{ inputs.self-contained }}
        run: |
          set -e
          OUT="bin/Release/${FRAMEWORK}/publish"
          rm -rf "$OUT"
          RID_ARG=
          if [ -n "$RID" ]; then
            RID_ARG="-r $RID"
          fi
          if [ "$SELF_CONTAINED" = "true" ]; then
            SC=(--self-contained true)
          else
            SC=(--self-contained false)
          fi
          echo "📦 dotnet publish → $OUT"
          dotnet publish "$CSPROJ" -c Release $RID_ARG "${SC[@]}" -f "$FRAMEWORK" -o "$OUT" /clp:ErrorsOnly
          echo "✅ Publish completed"

      - name: Strip server-only wwwroot folders (frontend)
        if: inputs.project-kind == 'frontend'
        env:
          FRAMEWORK: ${{ inputs.target-framework }}
        run: |
          OUT="bin/Release/${FRAMEWORK}/publish"
          rm -rf "$OUT/wwwroot/appkeys" "$OUT/wwwroot/files" 2>/dev/null || true
          echo "✅ Removed wwwroot/appkeys and wwwroot/files from artifact (if present)"

      - name: Normalize SSH host env (strip CR/LF from secrets)
        run: |
          h="${{ secrets.SSH_HOST }}"
          u="${{ secrets.SSH_USERNAME }}"
          p="${{ secrets.SSH_PORT || 22 }}"
          h="${h//$'\r'/}"
          h="${h//$'\n'/}"
          u="${u//$'\r'/}"
          u="${u//$'\n'/}"
          p="${p//$'\r'/}"
          p="${p//$'\n'/}"
          [ -n "$p" ] || p=22
          echo "GH_SSH_HOST=$h" >> "$GITHUB_ENV"
          echo "GH_SSH_USER=$u" >> "$GITHUB_ENV"
          echo "GH_SSH_PORT=$p" >> "$GITHUB_ENV"

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$GH_SSH_PORT" -H "$GH_SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Backup remote deployment
        if: inputs.backup-remote
        env:
          DEPLOY_PATH: ${{ inputs.deploy-path }}
          BACKUP_BASE: ${{ inputs.backup-base-path }}
          PROJECT_KIND: ${{ inputs.project-kind }}
        run: |
          ROLE=backend
          if [ "$PROJECT_KIND" = "frontend" ]; then ROLE=frontend; fi
          echo "💾 Backing up remote: $DEPLOY_PATH → $BACKUP_BASE/$ROLE/\$(date +%Y%m%d) (on server)"
          {
            echo "export DEPLOY_PATH=$(printf '%q' "$DEPLOY_PATH")"
            echo "export BACKUP_BASE=$(printf '%q' "$BACKUP_BASE")"
            echo "export ROLE=$(printf '%q' "$ROLE")"
            echo 'if [ -d "$DEPLOY_PATH" ] && [ "$(ls -A "$DEPLOY_PATH" 2>/dev/null)" ]; then'
            echo '  BACKUP_DIR="$BACKUP_BASE/$ROLE/$(date +%Y%m%d)"'
            echo '  mkdir -p "$BACKUP_DIR"'
            echo '  if [ "$ROLE" = "frontend" ]; then'
            echo '    rsync -a --no-perms --no-owner --no-group --omit-dir-times --exclude="wwwroot/files/" --exclude="wwwroot/image/" --exclude="wwwroot/appkeys/" "$DEPLOY_PATH/" "$BACKUP_DIR/"'
            echo '  else'
            echo '    rsync -a --no-perms --no-owner --no-group --omit-dir-times "$DEPLOY_PATH/" "$BACKUP_DIR/"'
            echo '  fi'
            echo '  echo "✅ Backup → $BACKUP_DIR"'
            echo 'else'
            echo '  echo "⚠️ Nothing to backup (empty or missing)"'
            echo 'fi'
          } | ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -o LogLevel=ERROR \
              -p "$GH_SSH_PORT" \
              -l "$GH_SSH_USER" "$GH_SSH_HOST" bash -s

      - name: Rsync publish output to server
        env:
          FRAMEWORK: ${{ inputs.target-framework }}
          DEPLOY_PATH: ${{ inputs.deploy-path }}
          RSYNC_DELETE: ${{ inputs.rsync-delete }}
          PROJECT_KIND: ${{ inputs.project-kind }}
          PRE_RSYNC_CHOWN: ${{ inputs.pre-rsync-chown }}
        run: |
          set -e
          LOCAL="bin/Release/${FRAMEWORK}/publish/"
          if [ ! -d "$LOCAL" ]; then
            echo "❌ Publish output not found: $LOCAL"
            exit 1
          fi
          DELETE_FLAG=
          if [ "$RSYNC_DELETE" = "true" ]; then
            DELETE_FLAG="--delete"
          fi
          PORT="$GH_SSH_PORT"
          REMOTE_USER="$GH_SSH_USER"
          REMOTE_HOST="$GH_SSH_HOST"
          RSYNC_TMP="/tmp/gha-rsync-${REMOTE_USER}"
          echo "📤 rsync → ${REMOTE_USER}@${REMOTE_HOST}:$DEPLOY_PATH"
          REMOTE_PREP="mkdir -p \"$DEPLOY_PATH\" \"$RSYNC_TMP\" && chmod 700 \"$RSYNC_TMP\""
          if [ "$PROJECT_KIND" = "frontend" ] && [ "$PRE_RSYNC_CHOWN" = "true" ]; then
            REMOTE_PREP="$REMOTE_PREP && sudo chown -R \"\$(id -un)\":\"\$(id -gn)\" \"$DEPLOY_PATH\""
          fi
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o LogLevel=ERROR -p "$PORT" \
            -l "$REMOTE_USER" "$REMOTE_HOST" "$REMOTE_PREP"
          # -rlDz: no -t → no utime on dest; -q → quiet log; --temp-dir → temp files not in root-owned wwwroot subdirs
          rsync -rlDzq --no-perms --no-owner --no-group --temp-dir="$RSYNC_TMP" $DELETE_FLAG \
            -e "ssh -i $HOME/.ssh/deploy_key -o StrictHostKeyChecking=no -o LogLevel=ERROR -p $PORT" \
            "$LOCAL" "${REMOTE_USER}@${REMOTE_HOST}:$DEPLOY_PATH/"
          echo "✅ Rsync completed"

      - name: Restart systemd service
        env:
          UNIT: ${{ inputs.systemd-service }}
        run: |
          echo "🔄 Restarting $UNIT"
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -o LogLevel=ERROR \
              -p "$GH_SSH_PORT" \
              -l "$GH_SSH_USER" "$GH_SSH_HOST" \
              "sudo systemctl restart $UNIT"
          echo "✅ Service restarted"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

      - name: Summary
        if: always()
        run: |
          echo "## 🚀 .NET Deployment Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | ${{ job.status == 'success' && '✅ Success' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Project** | ${{ inputs.csproj-path }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **TFM** | ${{ inputs.target-framework }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **RID** | ${{ inputs.runtime-identifier }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Kind** | ${{ inputs.project-kind }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Remote path** | ${{ inputs.deploy-path }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Backup base** | ${{ inputs.backup-base-path }} (if enabled) |" >> $GITHUB_STEP_SUMMARY
          echo "| **systemd** | ${{ inputs.systemd-service }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Ref** | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
