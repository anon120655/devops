# ─────────────────────────────────────────────────────────────
# 🔍 .NET CI — Caller Workflow (monorepo ที่ราก repo)
# ─────────────────────────────────────────────────────────────
# 📁 วางที่: <repo-root>/.github/workflows/ci.yml (ข้างๆ ThaiHealthAcademy.sln)
# 📝 โครงสัมพันธ์:
#    ThaiHealthAcademy.API/ThaiHealthAcademy.API.csproj  (backend)
#    ThaiHealthAcademy/ThaiHealthAcademy.csproj          (frontend)
#    root: ThaiHealthAcademy.sln — ไม่มี .csproj ที่ราก
# 📝 แก้ anon120655 เป็นชื่อ Organization ของคุณ
# 📝 ถ้า repo เดี่ยวโปรเจกต์ที่ root: ใช้ job เดียว + working-directory "." ก็พอ
# ─────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  quality-api:
    uses: anon120655/devops/.github/workflows/dotnet-ci.yml@main
    with:
      dotnet-version: "6.0.x"
      csproj-path: "ThaiHealthAcademy.API.csproj" # ชื่อไฟล์ภายใน working-directory
      target-framework: "net6.0"
      runtime-identifier: "linux-x64"
      build-configuration: "Release"
      working-directory: "ThaiHealthAcademy.API"
      runs-on: "self-hosted"

  quality-web:
    uses: anon120655/devops/.github/workflows/dotnet-ci.yml@main
    with:
      dotnet-version: "6.0.x"
      csproj-path: "ThaiHealthAcademy.csproj"
      target-framework: "net6.0"
      runtime-identifier: "linux-x64"
      build-configuration: "Release"
      working-directory: "ThaiHealthAcademy"
      runs-on: "self-hosted"
