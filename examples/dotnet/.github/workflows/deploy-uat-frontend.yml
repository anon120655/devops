# ─────────────────────────────────────────────────────────────
# 🚀 .NET Web (Razor/Blazor SSR ฯลฯ) — Deploy UAT
# ─────────────────────────────────────────────────────────────
# 📁 monorepo: ThaiHealthAcademy/ + ThaiHealthAcademy.csproj
# ─────────────────────────────────────────────────────────────
# 📝 UAT: ไม่สำรองโฟลเดอร์ปลายทางก่อน deploy (backup-remote: false)
# 📝 frontend: workflow จะ sudo chown deploy-path ให้ SSH user ก่อน rsync (แก้ mkstemp ใน wwwroot/config, image)
#    ต้องมี NOPASSWD สำหรับ chown (หรือปิดด้วย pre-rsync-chown: false แล้วจัด owner บนเซิร์ฟเวอร์เอง)
# 📝 project-kind: frontend จะลบ wwwroot/appkeys และ wwwroot/files ออกจาก artifact ก่อน rsync
#    (ไม่ทับไฟล์/โฟลเดอร์บน server ที่ runner ไม่ได้ส่งไป — ใช้ rsync-delete: false)
# ─────────────────────────────────────────────────────────────
name: Deploy Web to UAT

on:
  workflow_dispatch:

jobs:
  deploy:
    uses: anon120655/devops/.github/workflows/dotnet-deploy.yml@main
    with:
      dotnet-version: "6.0.x"
      csproj-path: "ThaiHealthAcademy.csproj"
      target-framework: "net6.0"
      runtime-identifier: "linux-x64"
      self-contained: false
      project-kind: "frontend"
      deploy-path: "/home/ibusiness/publish_frontend"
      systemd-service: "kestrel-helloapp.service"
      working-directory: "ThaiHealthAcademy"
      backup-remote: false
      rsync-delete: false
      runs-on: "self-hosted"
    secrets:
      SSH_PRIVATE_KEY: ${{ secrets.UAT_SSH_PRIVATE_KEY }}
      SSH_HOST: ${{ secrets.UAT_SSH_HOST }}
      SSH_USERNAME: ${{ secrets.UAT_SSH_USERNAME }}
      SSH_PORT: ${{ secrets.UAT_SSH_PORT }}
