# ─────────────────────────────────────────────────────────────
# 🔌 Test SSH (ทดสอบก่อน deploy จริง)
# ─────────────────────────────────────────────────────────────
name: Test SSH Connection

on:
  workflow_dispatch:

jobs:
  test-ssh:
    runs-on: self-hosted
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.UAT_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.UAT_SSH_PORT || 22 }} -H ${{ secrets.UAT_SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Test SSH
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -p ${{ secrets.UAT_SSH_PORT || 22 }} \
              -l "${{ secrets.UAT_SSH_USERNAME }}" \
              ${{ secrets.UAT_SSH_HOST }} \
              "echo '✅ UAT SSH OK' && whoami && pwd"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
