# ─────────────────────────────────────────────────────────────
# 🚀 Spring Boot Deploy - PRODUCTION
# ─────────────────────────────────────────────────────────────
# 📁 วางไฟล์นี้ไว้ที่: <springboot-project>/.github/workflows/deploy-prod.yml
# 📝 แก้ anon120655 เป็นชื่อ Organization ของลูกค้าบน GitHub
# 📝 แก้ค่า with: ให้ตรงกับ project ของคุณ
# ─────────────────────────────────────────────────────────────
name: Deploy to PRODUCTION

on:
  push:
    tags: ['v*']                # ← trigger เมื่อสร้าง tag เท่านั้น เช่น v1.0.0
  # schedule:
  #   - cron: '30 16 * * *'    # ← 23:30 Bangkok (UTC+7 = 16:30 UTC) ทุกวัน
  workflow_dispatch:            # ← หรือ กดรันเอง (เผื่อฉุกเฉิน)

jobs:
  deploy:
    uses: anon120655/devops/.github/workflows/springboot-deploy.yml@main
    with:
      java-version: '17'                                       # ← ปรับตามที่ project ใช้
      build-tool: 'maven'                                      # ← 'maven' หรือ 'gradle'
      war-filename: 'thaihealth-eform-backend.war'             # ← ชื่อไฟล์ WAR ที่ build ออกมา
      tomcat-webapps-path: '/opt/tomcat/webapps'               # ← path webapps ของ Tomcat บน PROD server
      deploy-staging-path: '/home/locus/deploy'                # ← path วาง WAR ชั่วคราวก่อน deploy บน PROD server
      tomcat-service-name: 'tomcat'                            # ← ชื่อ service ของ Tomcat
      runs-on: 'self-hosted'
    secrets:
      SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
      SSH_HOST: ${{ secrets.PROD_SSH_HOST }}                   # ← IP เครื่อง Production จริง
      SSH_USERNAME: ${{ secrets.PROD_SSH_USERNAME }}
      SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
