# ─────────────────────────────────────────────────────────────
# 🚀 Spring Boot Deploy - Caller Workflow
# ─────────────────────────────────────────────────────────────
# 📁 วางไฟล์นี้ไว้ที่: <springboot-project>/.github/workflows/deploy.yml
# 📝 แก้ anon120655 เป็นชื่อ Organization ของลูกค้าบน GitHub
# 📝 แก้ค่า with: ให้ตรงกับ project ของคุณ
# ─────────────────────────────────────────────────────────────
name: Deploy

on:
  push:
    tags: ['v*']                # ← trigger เมื่อสร้าง tag เช่น v1.0.0
  workflow_dispatch:            # ← หรือ กด Run workflow manually ที่ Actions tab

jobs:
  deploy:
    uses: anon120655/devops/.github/workflows/springboot-deploy.yml@main
    with:
      java-version: '17'                                       # ← ปรับตามที่ project ใช้
      build-tool: 'maven'                                      # ← 'maven' หรือ 'gradle'
      war-filename: 'thaihealth-eform-backend.war'             # ← ชื่อไฟล์ WAR ที่ build ออกมา
      tomcat-webapps-path: '/opt/tomcat/webapps'               # ← path webapps ของ Tomcat บน server
      deploy-staging-path: '/home/locus/deploy'                # ← path วาง WAR ชั่วคราวก่อน deploy
      tomcat-service-name: 'tomcat'                            # ← ชื่อ service ของ Tomcat
      # health-url: 'https://your-domain.com/api/health'       # ← (optional) URL สำหรับ health check
      runs-on: 'self-hosted'
    secrets:
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
      SSH_PORT: ${{ secrets.SSH_PORT }}
