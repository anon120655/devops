# ─────────────────────────────────────────────────────────────
# 🔍 Spring Boot CI - Caller Workflow
# ─────────────────────────────────────────────────────────────
# 📁 วางไฟล์นี้ไว้ที่: <springboot-project>/.github/workflows/ci.yml
# 📝 แก้ anon120655 เป็นชื่อ Organization ของลูกค้าบน GitHub
# ─────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  quality:
    uses: anon120655/devops/.github/workflows/springboot-ci.yml@main
    with:
      java-version: '17'              # ← ปรับตามที่ project ใช้ (8, 11, 17, 21)
      maven-profile: 'prod'           # ← profile สำหรับ maven
      runs-on: 'self-hosted'
